<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Sales Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #4facfe;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #00c6ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📦 Warehouse Sales Prediction</h2>

    <form action="/predict_form" method="post">
        <input type="number" name="year" placeholder="Enter Year" required><br>
        <input type="number" name="month" placeholder="Enter Month" required><br>
        <input type="number" step="any" name="retail_sales" placeholder="Retail Sales" required><br>
        <input type="number" step="any" name="retail_transfers" placeholder="Retail Transfers" required><br>

        <button type="submit">Predict</button>
       {% if prediction_text %}
    <div style="margin-top:20px; padding:10px; background:#e0f7fa; border-radius:8px;">
        <strong>📊 Result:</strong> {{ prediction_text }}
    </div>
{% endif %}
    </form>
</div>

</body>
</html>
